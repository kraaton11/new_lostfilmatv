name: open-pr

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-pull-request:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Find or create PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ github.ref_name }}
          PR_TITLE: ${{ github.ref_name }}
          PR_BODY: |
            Automated pull request for `${{ github.ref_name }}`.
        shell: bash
        run: |
          PR_NUMBER="$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')"

          if [ -z "$PR_NUMBER" ]; then
            gh pr create --base main --head "$BRANCH" --title "$PR_TITLE" --body "$PR_BODY"
            PR_NUMBER="$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.pr.outputs.pr_number }}" --auto --squash
