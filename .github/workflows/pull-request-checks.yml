name: pull-request-checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install auth bridge dependencies
        run: pip install ./backend/auth_bridge/backend

      - name: Run auth bridge tests
        run: python -m unittest discover -s backend/auth_bridge/backend/tests -p 'test_*.py'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Run unit tests, lint, and debug assembly
        run: ./gradlew testDebugUnitTest lint assembleDebug
