<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LostFilm Trusted Device</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f141a;
        color: #ffffff;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(460px, calc(100vw - 32px));
        display: grid;
        gap: 16px;
        padding: 28px;
        border-radius: 18px;
        background: rgba(20, 27, 34, 0.92);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        box-sizing: border-box;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.45;
      }
      .code {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }
      button {
        width: 100%;
        min-height: 54px;
        border: 0;
        border-radius: 12px;
        background: linear-gradient(180deg, #3f88dd 0%, #2767b5 100%);
        color: #ffffff;
        font: inherit;
        font-weight: 700;
      }
      .secondary {
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Авторизовать Android TV?</h1>
      <p>Доверенное устройство уже входило в LostFilm как {{ account_label }}.</p>
      <p>TV code</p>
      <div class="code">{{ user_code }}</div>
      <form method="post" action="/auth-bridge/trusted/authorize">
        <button type="submit">Авторизовать Android TV</button>
      </form>
      <form method="post" action="/auth-bridge/trusted/revoke">
        <button class="secondary" type="submit">Войти другим аккаунтом</button>
      </form>
    </main>
  </body>
</html>
