services:
  auth-backend:
    image: ${AUTH_BACKEND_IMAGE:-lostfilm-auth-bridge:auth-bazuka-pp-ua-amd64}
    restart: unless-stopped
    stop_grace_period: 20s
    mem_limit: ${AUTH_BACKEND_MEMORY_LIMIT:-256m}
    cpus: ${AUTH_BACKEND_CPUS:-0.50}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18015}:8000"
    environment:
      AUTH_BRIDGE_PUBLIC_BASE_URL: ${AUTH_BRIDGE_PUBLIC_BASE_URL:?set AUTH_BRIDGE_PUBLIC_BASE_URL}
      AUTH_BRIDGE_PUBLIC_BASE_DOMAIN: ${AUTH_BRIDGE_PUBLIC_BASE_DOMAIN:?set AUTH_BRIDGE_PUBLIC_BASE_DOMAIN}
      AUTH_BRIDGE_TRUSTED_PROXY_IPS: ${AUTH_BRIDGE_TRUSTED_PROXY_IPS:-127.0.0.1}
      AUTH_BRIDGE_TRUSTED_DEVICE_SECRET: ${AUTH_BRIDGE_TRUSTED_DEVICE_SECRET:-}
      AUTH_BRIDGE_TRUSTED_DEVICE_COOKIE_DOMAIN: ${AUTH_BRIDGE_TRUSTED_DEVICE_COOKIE_DOMAIN:-}
      AUTH_BRIDGE_TRUSTED_DEVICE_DB_PATH: ${AUTH_BRIDGE_TRUSTED_DEVICE_DB_PATH:-/data/trusted_devices.sqlite3}
      AUTH_BRIDGE_TRUSTED_DEVICE_TTL_SECONDS: ${AUTH_BRIDGE_TRUSTED_DEVICE_TTL_SECONDS:-31536000}
      AUTH_BRIDGE_LOSTFILM_BASE_URL: ${AUTH_BRIDGE_LOSTFILM_BASE_URL:-https://www.lostfilm.today}
      AUTH_BRIDGE_PAIRING_TTL_SECONDS: ${AUTH_BRIDGE_PAIRING_TTL_SECONDS:-600}
      AUTH_BRIDGE_PAIRING_POLL_INTERVAL_SECONDS: ${AUTH_BRIDGE_PAIRING_POLL_INTERVAL_SECONDS:-5}
      AUTH_BRIDGE_CLAIM_LEASE_TTL_SECONDS: ${AUTH_BRIDGE_CLAIM_LEASE_TTL_SECONDS:-60}
      AUTH_BRIDGE_CREATE_PAIRING_RATE_LIMIT_MAX_REQUESTS: ${AUTH_BRIDGE_CREATE_PAIRING_RATE_LIMIT_MAX_REQUESTS:-10}
      AUTH_BRIDGE_CREATE_PAIRING_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_BRIDGE_CREATE_PAIRING_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_BRIDGE_PAIRING_ACTION_RATE_LIMIT_MAX_REQUESTS: ${AUTH_BRIDGE_PAIRING_ACTION_RATE_LIMIT_MAX_REQUESTS:-120}
      AUTH_BRIDGE_PAIRING_ACTION_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_BRIDGE_PAIRING_ACTION_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_BRIDGE_PROXY_RATE_LIMIT_MAX_REQUESTS: ${AUTH_BRIDGE_PROXY_RATE_LIMIT_MAX_REQUESTS:-60}
      AUTH_BRIDGE_PROXY_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_BRIDGE_PROXY_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_BRIDGE_CLEANUP_INTERVAL_SECONDS: ${AUTH_BRIDGE_CLEANUP_INTERVAL_SECONDS:-60}
      AUTH_BRIDGE_UPSTREAM_TIMEOUT_SECONDS: ${AUTH_BRIDGE_UPSTREAM_TIMEOUT_SECONDS:-10}
      AUTH_BRIDGE_UPSTREAM_RETRY_ATTEMPTS: ${AUTH_BRIDGE_UPSTREAM_RETRY_ATTEMPTS:-2}
      AUTH_BRIDGE_UPSTREAM_RETRY_BACKOFF_SECONDS: ${AUTH_BRIDGE_UPSTREAM_RETRY_BACKOFF_SECONDS:-0.25}
      AUTH_BRIDGE_DEEPL_API_KEY: ${AUTH_BRIDGE_DEEPL_API_KEY:-}
      AUTH_BRIDGE_DEEPL_API_URL: ${AUTH_BRIDGE_DEEPL_API_URL:-https://api-free.deepl.com/v2/translate}
      AUTH_BRIDGE_DEEPL_TIMEOUT_SECONDS: ${AUTH_BRIDGE_DEEPL_TIMEOUT_SECONDS:-10}
      AUTH_BRIDGE_TRANSLATION_CACHE_MAX_ENTRIES: ${AUTH_BRIDGE_TRANSLATION_CACHE_MAX_ENTRIES:-1000}
      AUTH_BRIDGE_TRANSLATION_CACHE_TTL_SECONDS: ${AUTH_BRIDGE_TRANSLATION_CACHE_TTL_SECONDS:-604800}
      AUTH_BRIDGE_TRANSLATION_RATE_LIMIT_MAX_REQUESTS: ${AUTH_BRIDGE_TRANSLATION_RATE_LIMIT_MAX_REQUESTS:-120}
      AUTH_BRIDGE_TRANSLATION_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_BRIDGE_TRANSLATION_RATE_LIMIT_WINDOW_SECONDS:-60}
      AUTH_BRIDGE_LOG_FORMAT: ${AUTH_BRIDGE_LOG_FORMAT:-json}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: ${AUTH_BACKEND_LOG_MAX_SIZE:-10m}
        max-file: ${AUTH_BACKEND_LOG_MAX_FILE:-3}
    volumes:
      - trusted-devices:/data

volumes:
  trusted-devices:
