services:
  auth-backend:
    image: ${AUTH_BACKEND_IMAGE:-lostfilm-auth-bridge:auth-bazuka-pp-ua-amd64}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT:-18015}:8000"
    environment:
      AUTH_BRIDGE_PUBLIC_BASE_URL: ${AUTH_BRIDGE_PUBLIC_BASE_URL:?set AUTH_BRIDGE_PUBLIC_BASE_URL}
      AUTH_BRIDGE_PUBLIC_BASE_DOMAIN: ${AUTH_BRIDGE_PUBLIC_BASE_DOMAIN:?set AUTH_BRIDGE_PUBLIC_BASE_DOMAIN}
      AUTH_BRIDGE_LOSTFILM_BASE_URL: ${AUTH_BRIDGE_LOSTFILM_BASE_URL:-https://www.lostfilm.today}
      AUTH_BRIDGE_PAIRING_TTL_SECONDS: ${AUTH_BRIDGE_PAIRING_TTL_SECONDS:-600}
      AUTH_BRIDGE_PAIRING_POLL_INTERVAL_SECONDS: ${AUTH_BRIDGE_PAIRING_POLL_INTERVAL_SECONDS:-5}
      AUTH_BRIDGE_CLAIM_LEASE_TTL_SECONDS: ${AUTH_BRIDGE_CLAIM_LEASE_TTL_SECONDS:-60}
      AUTH_BRIDGE_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${AUTH_BRIDGE_LOGIN_RATE_LIMIT_MAX_REQUESTS:-10}
      AUTH_BRIDGE_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_BRIDGE_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
