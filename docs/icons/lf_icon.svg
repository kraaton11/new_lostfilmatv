<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background with rounded corners -->
  <rect width="100" height="100" fill="#3B7DD8" rx="20" ry="20"/>
  
  <!-- Letter L (left) -->
  <g stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical line of L -->
    <line x1="20" y1="20" x2="20" y2="80" />
    <!-- Horizontal bottom of L -->
    <line x1="20" y1="80" x2="40" y2="80" />
  </g>
  
  <!-- Letter F (right) -->
  <g stroke="white" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Vertical line of F -->
    <line x1="60" y1="20" x2="60" y2="80" />
    <!-- Top horizontal of F -->
    <line x1="60" y1="20" x2="80" y2="20" />
    <!-- Middle horizontal of F -->
    <line x1="60" y1="50" x2="77" y2="50" />
  </g>
</svg>