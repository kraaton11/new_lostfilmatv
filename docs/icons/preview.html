<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LostFilm Icon Preview</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #f5f5f5; }
        .icon { margin: 20px; }
        .info { margin-top: 20px; color: #666; }
    </style>
</head>
<body>
    <h2>Иконка LF для LostFilm</h2>
    <div class="icon">
        <img src="lf_icon.png" alt="LF Icon" style="width: 200px; height: 200px; image-rendering: pixelated;">
    </div>
    <div class="info">
        <p>Фон: синий #3B7DD8 (цвет приложения)</p>
        <p>Буквы: белые, разделенные, закругленные углы</p>
        <p>Размер PNG: 100x100 px</p>
    </div>
    <div>
        <p>Также доступен <a href="lf_icon.svg">SVG</a></p>
    </div>

</html>
